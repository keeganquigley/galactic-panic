name: Validate metadata

# PR gate: rejects any change that would leave a song's metadata.json invalid.
# A broken file (e.g. an unquoted ISRC) parses as invalid JSON and the Eleventy
# build silently *skips* that song — this check fails the PR instead so the
# problem is caught before merge.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      # Run through the npm scripts so package.json stays the single source of
      # truth for how these checks invoke (matching the deploy workflow). No
      # `npm ci` needed: the validator and tests are zero-dependency by design.
      - run: npm run validate
      - run: npm test
